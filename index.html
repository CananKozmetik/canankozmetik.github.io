<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Dorsy SHOP - Canan Kozmetik
</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<!-- TOP BAR -->

<div class="top-header">

  <p>
    Canan Kozmetik | Sipariş Destek Hattı
  </p>

</div>

<!-- MAIN HEADER -->

<header>

  <div class="logo">

    <h1>DORSY SHOP</h1>

    <span>
      Canan Kozmetik
    </span>

  </div>

  <div class="search-box">

    <input
    type="text"
    id="search"
    placeholder="Ürün, kategori ara...">

  </div>

</header>

<!-- CATEGORY NAVBAR -->

<nav class="navbar">

  <div class="category-bar">

    <button
    class="category-btn active"
    data-category="all">

      Tümü

    </button>

    <button
    class="category-btn"
    data-category="oda-kokusu">

      Oda Kokuları

    </button>

    <button
    class="category-btn"
    data-category="arac-kokusu">

      Araç Kokuları

    </button>

    <button
    class="category-btn"
    data-category="esansiyel">

      Esansiyel Yağlar

    </button>

    <button
    class="category-btn"
    data-category="sampuan">

      Şampuanlar

    </button>

    <button
    class="category-btn"
    data-category="sabun">

      Sabunlar

    </button>

    <button
    class="category-btn"
    data-category="kremler">

      Kremler

    </button>

  </div>

</nav>

<!-- HERO -->

<section class="hero">

  <div class="hero-overlay">

    <h2>
      Doğal Kozmetik Ürünleri
    </h2>

    <p>
      Dorsy SHOP - Canan Kozmetik
    </p>

  </div>

</section>

<!-- PRODUCTS -->

<section
class="products"
id="product-list">

</section>

<!-- FOOTER -->

<footer>

  <p>
    © 2026 Dorsy SHOP
  </p>

</footer>

<script src="script.js"></script>

</body>
</html>
